# electron-builder packaging — macOS, unsigned (ad-hoc) arm64.
#
# The app name stays "galileo" (package.json name); Electron's userData path
# follows it, so the star store and encrypted key file survive across versions
# (CLAUDE.md gotcha). productName is the display name only.
appId: digital.wong.galileo
productName: Galileo
copyright: © 2026 Roger Wong

directories:
  buildResources: build
  output: dist

# electron-builder's default matcher already includes out/, package.json, and
# the PRODUCTION node_modules — which must ship, because main externalizes its
# dependencies (electron.vite.config.ts: externalizeDepsPlugin) rather than
# bundling them. These negatives keep everything else out of the .app.
#
# Excluding data/ is load-bearing, not tidiness: the two committed tables the
# app reads at runtime (facet-map.json, enrichment.json) are bundled into
# out/renderer at build time, so nothing fs-reads data/ from a package. The raw
# Sched fetch (data/events.json / meta.json) is gitignored and Sched-authored
# prose — it must never enter a distributable. aliases/franchise-seed are
# build-time inputs for scripts/, not runtime.
files:
  - '!src'
  - '!scripts'
  - '!docs'
  - '!tests'
  - '!data'
  - '!electron.vite.config.ts'
  - '!eslint.config.{js,cjs,mjs}'
  - '!tsconfig*.json'
  - '!{.env,.env.*,.npmrc}'
  - '!**/*.map'

asar: true

mac:
  category: public.app-category.reference
  icon: build/icon.icns
  # Unsigned: no Developer ID identity. electron-builder falls back to an
  # ad-hoc signature (required for arm64 to launch at all); Gatekeeper still
  # needs a first-run right-click → Open. A real identity + notarization is the
  # future signed-release step, not this one.
  identity: null
  target:
    - target: dmg
      arch: [arm64]
    - target: zip
      arch: [arm64]

dmg:
  title: ${productName} ${version}
