name: Release (Windows)

# Builds the Windows x64 NSIS installer and uploads it to a GitHub Release.
#
# Trigger: pushing a version tag (e.g. `v0.1.0`) uploads into the DRAFT release
# for that tag — nothing goes public until you review the draft and click
# "Publish release" yourself. A manual run from the Actions tab builds and
# keeps the installer as a run artifact only; it never touches a release,
# because a dispatch from an arbitrary branch has no tag to signal which
# version it is meant to be.
#
# The workflow creates the draft itself (one per tag, with auto-generated
# notes to edit before publishing) and attaches assets with `gh release
# upload --clobber`, which is idempotent on retry. electron-builder runs with
# `--publish never`: its own GitHub publisher can't look up draft releases by
# tag, so an upload retry would mint a second draft for the same tag — that
# happened on v0.1.1. The mac runbook's manual `gh release upload` lands in
# this same draft.
#
# The build is UNSIGNED — there is no Authenticode cert wired up yet, so first
# run shows a SmartScreen warning. Adding a signing step later is additive and
# does not change this workflow's shape.
#
# Actions are pinned to commit SHAs (tag as comment): a moved v4 tag on a
# compromised action would otherwise run attacker code holding this job's
# contents:write token.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

# `gh release create/upload` need write access via GITHUB_TOKEN.
permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          # Don't write the contents:write token into .git/config — npm ci runs
          # dependency lifecycle scripts, and they have no business reading it.
          # electron-builder gets the token via the step-scoped GH_TOKEN below.
          persist-credentials: false

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      # A tag build must match the version electron-builder will publish under:
      # the release name/tag comes from package.json, not from the pushed ref,
      # so a forgotten version bump would silently upload into the wrong draft.
      - name: Verify tag matches package.json version
        if: github.ref_type == 'tag'
        shell: bash
        run: |
          pkg="v$(node -p "require('./package.json').version")"
          if [ "$pkg" != "$GITHUB_REF_NAME" ]; then
            echo "Tag $GITHUB_REF_NAME does not match package.json version $pkg — bump the version or fix the tag." >&2
            exit 1
          fi

      # The project's bar: typecheck and tests both pass before a build ships.
      # Both are cross-platform (tests run in the node environment). Drop these
      # two steps if a Windows-only path quirk ever blocks a legitimate build.
      - run: npm run typecheck
      - run: npm test

      # One draft per tag, created before anything uploads. `gh release view`
      # resolves drafts by tag (the GitHub UI does not), so a re-run of a
      # failed build reuses the existing draft instead of minting another.
      # --generate-notes drafts the notes from the commits since the previous
      # release — a scaffold to rewrite on the release page before publishing.
      - name: Create draft release
        if: github.ref_type == 'tag'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          if gh release view "$GITHUB_REF_NAME" --json isDraft --jq .isDraft >/dev/null 2>&1; then
            echo "Release for $GITHUB_REF_NAME already exists — reusing it."
          else
            gh release create "$GITHUB_REF_NAME" --draft --title "${GITHUB_REF_NAME#v}" --generate-notes
          fi

      # electron-vite compiles main/preload/renderer into out/; electron-builder
      # packages it into the NSIS installer. Publishing is never delegated to
      # electron-builder (see header); tag builds attach assets in the next
      # step, dispatch builds stop at the run artifact below.
      - run: npm run build
      - run: npx electron-builder --win --publish never

      - name: Upload installer to the draft release
        if: github.ref_type == 'tag'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: gh release upload "$GITHUB_REF_NAME" dist/*-setup.exe dist/*-setup.exe.blockmap dist/latest.yml --clobber

      # Also keep the installer on the run page, so it's grabbable even if the
      # release upload is the thing that fails — hence !cancelled(), because the
      # default step condition would skip this on exactly that failure.
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: ${{ !cancelled() }}
        with:
          name: galileo-windows-setup
          path: dist/*.exe
          if-no-files-found: error
