name: Release (Windows)

# Builds the Windows x64 NSIS installer and uploads it to a GitHub Release.
#
# Trigger: pushing a version tag (e.g. `v0.1.0`), or a manual run from the
# Actions tab. electron-builder creates/updates a DRAFT release named after the
# package.json version, so nothing goes public until you review the draft and
# click "Publish release" yourself.
#
# The build is UNSIGNED — there is no Authenticode cert wired up yet, so first
# run shows a SmartScreen warning. Adding a signing step later is additive and
# does not change this workflow's shape.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

# electron-builder needs write access to create the release with GITHUB_TOKEN.
permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      # The project's bar: typecheck and tests both pass before a build ships.
      # Both are cross-platform (tests run in the node environment). Drop these
      # two steps if a Windows-only path quirk ever blocks a legitimate build.
      - run: npm run typecheck
      - run: npm test

      # electron-vite compiles main/preload/renderer into out/; electron-builder
      # packages it into the NSIS installer and publishes the draft release.
      - run: npm run build
      - run: npx electron-builder --win --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Also keep the installer on the run page, so it's grabbable even if the
      # release upload is ever the thing that fails.
      - uses: actions/upload-artifact@v4
        with:
          name: galileo-windows-setup
          path: dist/*.exe
          if-no-files-found: error
